#!/bin/bash
# ==============================================================================
# FastNodeUbuntu — config/settings.conf
# Поддержка: Ubuntu 22.04 LTS / Ubuntu 24.04 LTS
# ==============================================================================

# ── SSH ────────────────────────────────────────────────────────────────────────
SSH_PORT="2225"               # Порт SSH (не 22!)
SSH_PERMIT_ROOT="yes"         # Разрешить вход под root (yes/no/prohibit-password)
SSH_PASSWORD_AUTH="no"        # Вход по паролю (no = только ключ)
SSH_EMPTY_PASSWORDS="no"      # Пустые пароли
SSH_PUBLIC_KEY=""             # Публичный ключ (пусто = спросить интерактивно)

# ── SWAP ───────────────────────────────────────────────────────────────────────
SWAP_FILE="/swapfile"         # Путь к swap-файлу
SWAP_SIZE="2G"                # Размер по умолчанию (может быть выбран интерактивно)
SWAP_SWAPPINESS="10"          # Aggressiveness swap (10 = почти не используем)

# ── Время ─────────────────────────────────────────────────────────────────────
TIMEZONE="Europe/Moscow"      # Часовой пояс

# ── Локаль ────────────────────────────────────────────────────────────────────
LOCALE_LANG="ru_RU.UTF-8"
LOCALE_CHARSET="UTF-8"

# ── Порты UFW (помимо SSH_PORT) ────────────────────────────────────────────────
ALLOWED_PORTS=(
    "80"
    "443"
    "8080"
    "8443"
    "2053"
    "2083"
    "2087"
    "2096"
)

# ── Базовые пакеты ─────────────────────────────────────────────────────────────
REQUIRED_PACKAGES=(
    curl
    wget
    git
    htop
    mc
    net-tools
    dnsutils
    ca-certificates
    gnupg2
    lsb-release
    bc
    unzip
    zip
    iotop
    ncdu
    software-properties-common
    apt-transport-https
)
